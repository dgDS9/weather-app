<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- <title>Weather Forecasting • ML (XGBoost)</title> -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:,">
</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <!-- simple inline icon -->
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8.5 18.5C6 18.5 4 16.5 4 14c0-2.3 1.7-4.2 3.9-4.5A5.5 5.5 0 0 1 18.5 12c1.9.2 3.5 1.8 3.5 3.8 0 2.1-1.7 3.7-3.8 3.7H8.5Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M12 3v2.2M4.7 6.2l1.6 1.6M19.3 6.2l-1.6 1.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="brandText">
        <div class="brandTitle">Weather Forecast</div>
        <div class="brandSub">XGBoost • t+24h</div>
      </div>
    </div>

    <div class="actions">
      <button id="btnRefresh" class="btn" type="button">
        Refresh
        <span class="btnIcon" aria-hidden="true">↻</span>
      </button>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div class="heroLeft">
        <div class="pill">
          <span class="dot"></span>
          Live (based on historical data) 
        </div>

        <h1 class="headline">
          <span id="location">—</span>
        </h1>

        <div class="meta">
          <div class="metaItem">
            <div class="metaLabel">Observation</div>
            <div id="obsTime" class="metaValue">—</div>
          </div>
          <div class="metaItem">
            <div class="metaLabel">Forecast time</div>
            <div id="fcTime" class="metaValue">—</div>
          </div>
        </div>

        <div id="status" class="status" hidden></div>
      </div>

      <div class="heroRight">
        <div class="glass big">
          <div class="bigTop">
            <div class="bigLabel">Current</div>
            <div class="bigValue">
              <span id="nowTemp">—</span><span class="unit">°C</span>
            </div>
          </div>

          <div class="bigDivider"></div>

          <div class="bigBottom">
            <div class="bigLabel">Prediction (t+24h)</div>
            <div class="bigValue">
              <span id="predTemp">—</span><span class="unit">°C</span>
            </div>
          </div>
        </div>

        <article class="card">
          <h2 class="cardTitle">Notes</h2>
          <ul class="list">
            <li>No cookies, no tracking, no user accounts</li>
            <li>Weather-only data, no personal data stored</li>
          </ul>
        </article>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
